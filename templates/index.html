<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Agent</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --glass: rgba(255,255,255,0.07);
    --glass-border: rgba(255,255,255,0.13);
    --glass-hover: rgba(255,255,255,0.12);
    --accent: #a78bfa;
    --accent2: #60a5fa;
    --user-bg: rgba(167,139,250,0.15);
    --ai-bg: rgba(96,165,250,0.10);
    --text: #e8e8f0;
    --muted: rgba(255,255,255,0.35);
    --bg1: #0a0a14;
    --bg2: #0e0e1e;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg1);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Animated background ── */
  .bg-orbs {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }
  .orb {
    position: absolute; border-radius: 50%;
    filter: blur(80px); opacity: 0.25;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .orb1 { width: 500px; height: 500px; background: #7c3aed; top: -100px; left: -100px; animation-delay: 0s; }
  .orb2 { width: 400px; height: 400px; background: #2563eb; bottom: -80px; right: -80px; animation-delay: -4s; }
  .orb3 { width: 300px; height: 300px; background: #0ea5e9; top: 40%; left: 50%; animation-delay: -8s; }

  @keyframes drift {
    0%   { transform: translate(0,0) scale(1); }
    100% { transform: translate(40px, 30px) scale(1.08); }
  }

  /* ── Layout ── */
  .app {
    position: relative; z-index: 1;
    display: grid;
    grid-template-columns: 280px 1fr;
    height: 100vh;
  }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--glass);
    border-right: 1px solid var(--glass-border);
    backdrop-filter: blur(20px);
    padding: 28px 20px;
    display: flex; flex-direction: column; gap: 24px;
    animation: slideInLeft 0.5s cubic-bezier(.16,1,.3,1) both;
  }

  @keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-30px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  .logo span { font-size: 13px; display: block; -webkit-text-fill-color: var(--muted); font-family: 'DM Sans', sans-serif; font-weight: 300; margin-top: 2px; }

  .section-label {
    font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 8px;
  }

  .glass-select, .glass-input, .glass-textarea {
    width: 100%;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    transition: border-color .2s, background .2s;
    appearance: none;
  }
  .glass-select:focus, .glass-input:focus, .glass-textarea:focus {
    border-color: var(--accent);
    background: var(--glass-hover);
  }
  .glass-textarea { resize: none; height: 80px; line-height: 1.6; }

  .select-wrap { position: relative; }
  .select-wrap::after {
    content: '▾'; position: absolute; right: 12px; top: 50%;
    transform: translateY(-50%); color: var(--muted); pointer-events: none; font-size: 12px;
  }

  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--glass); border: 1px solid var(--glass-border);
    border-radius: 12px; padding: 10px 14px;
  }
  .toggle-label { font-size: 13px; color: var(--text); }
  .toggle {
    position: relative; width: 40px; height: 22px;
    cursor: pointer;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.1);
    border-radius: 11px;
    transition: background .3s;
  }
  .toggle input:checked + .toggle-track { background: var(--accent); }
  .toggle-thumb {
    position: absolute; width: 16px; height: 16px;
    background: #fff; border-radius: 50%;
    top: 3px; left: 3px;
    transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    pointer-events: none;
  }
  .toggle input:checked ~ .toggle-thumb { transform: translateX(18px); }

  .clear-btn {
    margin-top: auto;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 12px; color: #fca5a5;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; padding: 10px;
    cursor: pointer; transition: all .2s; width: 100%;
  }
  .clear-btn:hover { background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.4); }

  /* ── Chat area ── */
  .chat-area {
    display: flex; flex-direction: column;
    animation: fadeIn 0.6s ease both;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .chat-messages {
    flex: 1; overflow-y: auto;
    padding: 32px 40px;
    display: flex; flex-direction: column; gap: 20px;
    scroll-behavior: smooth;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 2px; }

  .empty-state {
    margin: auto; text-align: center;
    animation: floatUp 0.8s ease both;
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
  .empty-state p { color: var(--muted); font-size: 15px; font-weight: 300; }

  @keyframes floatUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Messages ── */
  .msg-wrap {
    display: flex; flex-direction: column;
    animation: msgIn 0.4s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-wrap.user { align-items: flex-end; }
  .msg-wrap.ai   { align-items: flex-start; }

  .msg-label {
    font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px; padding: 0 4px;
  }

  .msg-bubble {
    max-width: 70%; padding: 14px 18px;
    border-radius: 20px; font-size: 14px; line-height: 1.7;
    backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    position: relative; overflow: hidden;
  }
  .msg-bubble::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.05), transparent);
    pointer-events: none;
  }

  .msg-wrap.user .msg-bubble {
    background: var(--user-bg);
    border-color: rgba(167,139,250,0.25);
    border-bottom-right-radius: 4px;
  }
  .msg-wrap.ai .msg-bubble {
    background: var(--ai-bg);
    border-color: rgba(96,165,250,0.2);
    border-bottom-left-radius: 4px;
  }

  /* Typing animation */
  .typing-cursor::after {
    content: '▋';
    animation: blink .7s step-end infinite;
    color: var(--accent2);
    margin-left: 2px;
  }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

  /* Thinking dots */
  .thinking {
    display: flex; gap: 6px; padding: 16px 18px;
    background: var(--ai-bg); border: 1px solid rgba(96,165,250,0.2);
    border-radius: 20px; border-bottom-left-radius: 4px;
    backdrop-filter: blur(12px);
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent2); opacity: 0.6;
    animation: bounce 1.2s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); opacity: .4; }
    40%          { transform: translateY(-8px); opacity: 1; }
  }

  /* ── Input bar ── */
  .input-bar {
    padding: 20px 40px 28px;
    border-top: 1px solid var(--glass-border);
    background: rgba(10,10,20,0.6);
    backdrop-filter: blur(20px);
  }
  .input-row {
    display: flex; gap: 10px; align-items: center;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 16px; padding: 8px 8px 8px 18px;
    transition: border-color .2s;
  }
  .input-row:focus-within { border-color: var(--accent); }

  .input-row input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 14px;
  }
  .input-row input::placeholder { color: var(--muted); }

  .send-btn {
    width: 40px; height: 40px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; transition: transform .2s, opacity .2s;
    flex-shrink: 0;
  }
  .send-btn:hover { transform: scale(1.08); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
</style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="app">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div>
      <div class="logo">◆ AI Agent <span>Powered by LangGraph</span></div>
    </div>

    <div>
      <div class="section-label">Model</div>
      <div class="select-wrap">
        <select class="glass-select" id="model">
          <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
          <option value="qwen/qwen3-32b">Qwen 3 32B</option>
          <option value="openai/gpt-oss-120b">GPT OSS 120B</option>
        </select>
      </div>
    </div>

    <div>
      <div class="section-label">Web Search</div>
      <div class="toggle-row">
        <span class="toggle-label">Enable Tavily Search</span>
        <label class="toggle">
          <input type="checkbox" id="search" checked/>
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
    </div>

    <div>
      <div class="section-label">System Prompt</div>
      <textarea class="glass-textarea" id="system-prompt" placeholder="You are a smart and helpful AI assistant.">You are a smart and helpful AI assistant.</textarea>
    </div>

    <button class="clear-btn" onclick="clearChat()">✕ Clear Chat</button>
  </aside>

  <!-- ── Chat ── -->
  <main class="chat-area">
    <div class="chat-messages" id="messages">
      <div class="empty-state" id="empty">
        <div class="empty-icon">◆</div>
        <p>Send a message to begin</p>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-row">
        <input type="text" id="query" placeholder="Ask anything..." autocomplete="off"
          onkeydown="if(event.key==='Enter') sendMessage()"/>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </main>

</div>

<script>
  let chatHistory = [];

  function clearChat() {
    chatHistory = [];
    const box = document.getElementById('messages');
    box.innerHTML = `<div class="empty-state" id="empty">
      <div class="empty-icon">◆</div>
      <p>Send a message to begin</p>
    </div>`;
  }

  function appendMessage(role, content, typing = false) {
    const empty = document.getElementById('empty');
    if (empty) empty.remove();

    const box = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = `msg-wrap ${role}`;
    wrap.id = role === 'ai' && typing ? 'ai-typing' : '';

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'You' : '◆ Agent';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble' + (typing ? ' typing-cursor' : '');
    bubble.textContent = content;

    wrap.appendChild(label);
    wrap.appendChild(bubble);
    box.appendChild(wrap);
    box.scrollTop = box.scrollHeight;
    return bubble;
  }

  function showThinking() {
    const empty = document.getElementById('empty');
    if (empty) empty.remove();

    const box = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap ai';
    wrap.id = 'thinking-wrap';

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = '◆ Agent';

    const dots = document.createElement('div');
    dots.className = 'thinking';
    dots.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

    wrap.appendChild(label);
    wrap.appendChild(dots);
    box.appendChild(wrap);
    box.scrollTop = box.scrollHeight;
  }

  function removeThinking() {
    const el = document.getElementById('thinking-wrap');
    if (el) el.remove();
  }

  async function typeMessage(bubble, text) {
    bubble.textContent = '';
    for (let i = 0; i < text.length; i++) {
      bubble.textContent += text[i];
      document.getElementById('messages').scrollTop = 99999;
      await new Promise(r => setTimeout(r, 12));
    }
    bubble.classList.remove('typing-cursor');
  }

  async function sendMessage() {
    const input = document.getElementById('query');
    const query = input.value.trim();
    if (!query) return;

    const model = document.getElementById('model').value;
    const search = document.getElementById('search').checked;
    const systemPrompt = document.getElementById('system-prompt').value;
    const btn = document.getElementById('send-btn');

    input.value = '';
    btn.disabled = true;

    appendMessage('user', query);
    chatHistory.push({ role: 'user', content: query });

    showThinking();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model_name: model,
          system_prompt: systemPrompt,
          messages: [query],
          allow_research: search,
          chat_history: chatHistory.slice(0, -1)
        })
      });

      const data = await res.json();
      const reply = data.response || data.error || 'No response.';

      removeThinking();

      const bubble = appendMessage('ai', '', true);
      await typeMessage(bubble, reply);

      chatHistory.push({ role: 'assistant', content: reply });

    } catch (err) {
      removeThinking();
      appendMessage('ai', '⚠ Backend not running. Run: python main.py');
    }

    btn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
